apiVersion: apps/v1
kind: Deployment
metadata:
  name: spotify-predict-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spotify-predict-api
  template:
    metadata:
      labels:
        app: spotify-predict-api
    spec:
      containers:
        - name: spotify-predict-api
          image: ghcr.io/your-org/spotify-serving-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: spotify-predict-config
            - secretRef:
                name: spotify-predict-secret
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: outputs
              mountPath: /app/outputs
      volumes:
        - name: outputs
          persistentVolumeClaim:
            claimName: spotify-outputs-pvc
