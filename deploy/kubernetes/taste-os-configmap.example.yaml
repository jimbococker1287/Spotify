apiVersion: v1
kind: ConfigMap
metadata:
  name: spotify-taste-os-config
data:
  SERVICE_MODE: taste-os
  PORT: "8010"
  RUN_DIR: /app/outputs/deployments/registry/channels/stable
  TASTE_OS_OUTPUT_DIR: /app/outputs/analysis/taste_os_service
  REQUEST_RATE_LIMIT: "240"
  RATE_LIMIT_BACKEND: redis
  REDIS_URL: redis://spotify-redis:6379/0
  OTEL_ENABLED: "1"
  AUTH_MODE: token_or_jwt
  AUTH_SCOPE: all
  JWT_ALGORITHMS: RS256
  JWT_ISSUER: https://issuer.example.com/
  JWT_AUDIENCE: spotify-taste-os
  JWT_REQUIRED_SCOPES: taste-os:write
